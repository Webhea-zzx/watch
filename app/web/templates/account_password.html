{% extends "base.html" %}
{% block title %}修改密码 — 手表数据后台{% endblock %}
{% block content %}
<h1>修改密码</h1>
<p class="page-actions">
  <a href="/">总览</a>
  <a href="/devices">全部手表</a>
</p>
{% if ok %}
<p class="help" style="color: var(--primary); font-weight: 600;">{{ ok }}</p>
{% endif %}
{% if error %}
<p role="alert">{{ error }}</p>
{% endif %}
<p class="help">新密码至少 8 位；修改后立即生效，凭据保存在服务器 <code class="tech">data/web_auth.json</code>（勿泄露）。</p>
<form method="post" action="/account/password" class="auth-form" style="max-width: 22rem;">
  <label>
    当前密码
    <input type="password" name="current_password" autocomplete="current-password" required />
  </label>
  <label>
    新密码
    <input type="password" name="new_password" autocomplete="new-password" minlength="8" required />
  </label>
  <label>
    确认新密码
    <input type="password" name="new_password2" autocomplete="new-password" minlength="8" required />
  </label>
  <button type="submit">保存</button>
</form>
{% endblock %}
