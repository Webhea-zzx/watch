{% extends "base.html" %}
{% block title %}登录 — 手表数据后台{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1>登录</h1>
  <p class="help">请输入管理后台账号密码。</p>
  {% if error %}
  <p role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="auth-form">
    <input type="hidden" name="next" value="{{ next }}" />
    <label>
      用户名
      <input type="text" name="username" value="{{ username_hint }}" autocomplete="username" required />
    </label>
    <label>
      密码
      <input type="password" name="password" autocomplete="current-password" required />
    </label>
    <button type="submit">登录</button>
  </form>
</div>
{% endblock %}
