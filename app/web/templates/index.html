{% extends "base.html" %}
{% block title %}总览 — 手表数据后台{% endblock %}
{% block content %}
<h1>总览</h1>

<div class="stat-grid">
  <article class="stat-card">
    <h3>在线手表</h3>
    <p class="num">{{ online }}</p>
  </article>
  <article class="stat-card">
    <h3>已登记手表</h3>
    <p class="num">{{ devices }}</p>
  </article>
  <article class="stat-card">
    <h3>近 1 小时条数</h3>
    <p class="num">{{ messages_last_hour }}</p>
  </article>
</div>

<h2>最新记录</h2>
<div class="table-scroll">
  <div id="recent" class="table-host" hx-get="/partials/recent" hx-trigger="load, every 3s" hx-swap="innerHTML">
    <p class="muted" style="padding:1rem">加载中</p>
  </div>
</div>
{% endblock %}
